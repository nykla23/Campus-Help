# .github/workflows/preview.yml
name: CI/CD for Campus-Help Program

on:
  push:
    branches: [ main ]   # 推送到main分支时触发
  pull_request:
    branches: [ main ]

jobs:
  # 任务一：代码质量检查
  quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci  # 推荐使用 npm ci 以获得更快的速度和更确定的安装

      - name: Run Lint
        run: npm run lint # 确保你的 package.json 中有 lint 脚本

      - name: Run tests
        run: npm test     # 确保你的 package.json 中有 test 脚本

  # 任务二：自动上传预览版
  deploy-preview:
    # 仅在推送到主分支时执行
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: quality-check  # 依赖上一个任务，只有检查通过才执行
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build  # 如果项目有构建步骤，确保有对应的脚本

      - name: Upload to WeChat Mini Program
        uses: tencentcom/miniprogram-ci@v4
        with:
          appid: ${{ secrets.MINI_APP_ID }}
          type: 'miniProgram'
          projectPath: './'   # 小程序项目根目录，根据实际情况修改
          privateKey: ${{ secrets.MINI_APP_PRIVATE_KEY }}
          # 预览模式，会生成一个体验版的二维码
          preview: true
          # 若有上传需求，可将 preview 设为 false，并打开 upload 注释
          # preview: false
          # upload: true
          # version: '1.0.0'
          # desc: 'Automated upload by GitHub Actions'
