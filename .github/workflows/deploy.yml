name: Deploy

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.gitignore'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  security-scan:
    name: Security Scan
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@v0.35.0
        with:
          scan-type: fs
          scan-ref: backend/
          format: table
          exit-code: 1
          severity: HIGH,CRITICAL
          ignore-unfixed: true

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.4
        env:
          MYSQL_ROOT_PASSWORD: root123
          MYSQL_DATABASE: campus_help
          MYSQL_USER: campus_user
          MYSQL_PASSWORD: campus_pass
        ports:
          - 3306:3306
        options: --health-cmd="mysqladmin ping" --health-interval=10s --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Initialize Database
        run: mysql -h 127.0.0.1 -u root -proot123 campus_help < backend/sql/db_init.sql
      - name: Install Backend Dependencies
        run: cd backend && npm ci
      - name: Backend Tests
        run: cd backend && npm test
        env:
          DB_HOST: 127.0.0.1
          DB_USER: root
          DB_PASSWORD: root123
          DB_NAME: campus_help
          JWT_SECRET: test-secret
          PORT: '3000'
      - name: Install Frontend Dependencies
        run: cd frontend && npm ci
      - name: Frontend Tests
        run: cd frontend && npm test

  build-and-push:
    name: Build & Push to GHCR
    needs: [test, security-scan]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      # 将仓库名转换为小写
      - name: Convert repository name to lowercase
        id: repo
        run: |
          echo "LOWER_REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      # - name: Extract metadata for Backend
      #   id: meta-backend
      #   uses: docker/metadata-action@v5
      #   with:
      #     images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-backend
      #     tags: |
      #       type=raw,value=latest,enable={{is_default_branch}}
      #       type=sha,prefix=,format=short
      - name: Build and Push Backend
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.LOWER_REPO }}-backend:latest
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.LOWER_REPO }}-backend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build and Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.LOWER_REPO }}-frontend:latest
            ${{ env.REGISTRY }}/${{ steps.repo.outputs.LOWER_REPO }}-frontend:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Check Image Sizes
        run: |
          docker images --filter=reference=${{ env.REGISTRY }}/* --format '{{.Repository}}:{{.Tag}} Size: {{.Size}}'


  deploy:
    name: Deploy to Aliyun ECS
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.ALIYUN_HOST }}
          username: ${{ secrets.ALIYUN_USERNAME }}
          key: ${{ secrets.ALIYUN_SSH_KEY }}
          script: |
            cd ~/Campus-Help

            # 拉取最新代码（更新 compose.prod.yaml 等配置文件）
            git pull origin main

            # 登录 GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            # 拉取最新镜像
            docker compose -f compose.prod.yaml pull

            # 重新创建并启动容器（用最新镜像）
            docker compose -f compose.prod.yaml up -d --force-recreate

            # 清理旧镜像（保留最近3个）
            docker image prune -a -f --filter "until=24h"

            # 检查部署状态
            echo "=== 部署状态 ==="
            docker compose -f compose.prod.yaml ps
            echo "=== 健康检查 ==="
            sleep 5
            curl -s http://localhost:3000/health || echo "健康检查失败"