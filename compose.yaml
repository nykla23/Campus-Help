name: campus-help-dev

services:
  db:
    image: mysql:8.4
    container_name: campus-help-db-dev
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root123
      MYSQL_DATABASE: campus_help
      MYSQL_USER: campus_user
      MYSQL_PASSWORD: campus_pass
    ports:
      - "3307:3306"
    volumes:
      - mysql_data_dev:/var/lib/mysql
      - ./backend/sql/db_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: campus-help-backend-dev
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: campus_user
      DB_PASSWORD: campus_pass
      DB_NAME: campus_help
      JWT_SECRET: dev-secret-key
      PORT: "3000"
      NODE_ENV: development
    volumes:
      - ./backend:/app
      - /app/node_modules
      - backend_uploads_dev:/app/uploads
    depends_on:
      db:
        condition: service_healthy

volumes:
  mysql_data_dev:
  backend_uploads_dev:
