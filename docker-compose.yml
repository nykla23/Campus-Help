version: "3.8"

services:
  db:
    image: mysql:8.0
    container_name: campus-help-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${DB_NAME:-campus_help}
      MYSQL_USER: ${DB_USER:-campus_user}
      MYSQL_PASSWORD: ${DB_PASSWORD:-campus_pass}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/db_init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: campus-help-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      DB_HOST: db
      DB_USER: ${DB_USER:-campus_user}
      DB_PASSWORD: ${DB_PASSWORD:-campus_pass}
      DB_NAME: ${DB_NAME:-campus_help}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      PORT: "3000"
    volumes:
      - backend_uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

volumes:
  mysql_data:
  backend_uploads:
