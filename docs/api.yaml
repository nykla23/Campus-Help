openapi: 3.0.0
info:
  title: Campus Help API
  description: 校园帮小程序后端接口文档
  version: 1.0.0
servers:
  - url: http://localhost:3000/api
    description: 本地开发环境

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 0
        data:
          type: object
        message:
          type: string
          example: success
      required:
        - code
        - message

    ApiResponseList:
      type: object
      properties:
        code:
          type: integer
          example: 0
        data:
          type: object
          properties:
            total:
              type: integer
            page:
              type: integer
            limit:
              type: integer
            list:
              type: array
              items:
                type: object
        message:
          type: string
          example: success

    UserRegister:
      type: object
      required:
        - username
        - password
        - confirmPassword
      properties:
        username:
          type: string
        nickname:
          type: string
        password:
          type: string
        confirmPassword:
          type: string

    UserLogin:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    UserUpdateProfile:
      type: object
      properties:
        nickname:
          type: string
        signature:
          type: string

    UserChangePassword:
      type: object
      required:
        - oldPassword
        - newPassword
      properties:
        oldPassword:
          type: string
        newPassword:
          type: string

    TaskCreate:
      type: object
      required:
        - title
        - reward
      properties:
        title:
          type: string
        description:
          type: string
        reward:
          type: integer
        location:
          type: string
        type:
          type: integer
        deadline:
          type: string
          format: date-time

    ReviewCreate:
      type: object
      required:
        - taskId
        - toUserId
        - rating
      properties:
        taskId:
          type: integer
        toUserId:
          type: integer
        rating:
          type: integer
        comment:
          type: string

    MessageSend:
      type: object
      required:
        - taskId
        - targetId
        - content
      properties:
        taskId:
          type: integer
        targetId:
          type: integer
        content:
          type: string

paths:
  # ====================== 用户模块 ======================
  /users/register:
    post:
      summary: 用户注册
      tags: [用户模块]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserRegister'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /users/login:
    post:
      summary: 用户登录
      tags: [用户模块]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserLogin'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /users/profile:
    get:
      summary: 获取当前用户信息
      tags: [用户模块]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /users/updateProfile:
    post:
      summary: 修改个人信息
      tags: [用户模块]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdateProfile'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /users/updatePassword:
    post:
      summary: 修改密码
      tags: [用户模块]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserChangePassword'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /users/uploadAvatar:
    post:
      summary: 上传头像
      tags: [用户模块]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /users/myPublishTasks:
    get:
      summary: 我发布的任务
      tags: [用户模块]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'

  /users/myReceiveTasks:
    get:
      summary: 我接单的任务
      tags: [用户模块]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'

  /users/transactions:
    get:
      summary: 我的交易记录
      tags: [用户模块]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'

  # ====================== 任务模块 ======================
  /tasks/list:
    get:
      summary: 获取任务列表
      tags: [任务模块]
      parameters:
        - name: page
          in: query
          schema:
            type: integer
        - name: limit
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: integer
        - name: type
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'

  /tasks/publish:
    post:
      summary: 发布任务
      tags: [任务模块]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /tasks/detail/{taskId}:
    get:
      summary: 任务详情
      tags: [任务模块]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /tasks/accept/{taskId}:
    post:
      summary: 接单
      tags: [任务模块]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /tasks/giveUp/{taskId}:
    post:
      summary: 放弃任务
      tags: [任务模块]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /tasks/complete/{taskId}:
    post:
      summary: 我已完成任务
      tags: [任务模块]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /tasks/confirm/{taskId}:
    post:
      summary: 发布者确认完成
      tags: [任务模块]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /tasks/cancel/{taskId}:
    post:
      summary: 取消任务
      tags: [任务模块]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  # ====================== 评价模块 ======================
  /reviews/add:
    post:
      summary: 提交评价
      tags: [评价模块]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /reviews/list/{userId}:
    get:
      summary: 获取用户评价列表
      tags: [评价模块]
      parameters:
        - name: userId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'

  # ====================== 消息模块 ======================
  /messages/conversations:
    get:
      summary: 消息会话列表
      tags: [消息模块]
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'

  /messages/chat/{taskId}/{targetId}:
    get:
      summary: 获取聊天记录
      tags: [消息模块]
      security:
        - bearerAuth: []
      parameters:
        - name: taskId
          in: path
          required: true
          schema:
            type: integer
        - name: targetId
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'

  /messages/send:
    post:
      summary: 发送消息
      tags: [消息模块]
      security:
        - bearerAuth: []
      requestBody:
        required: true
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/MessageSend'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'