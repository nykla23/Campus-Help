openapi: 3.0.0
info:
  title: Campus Help RESTful API
  version: 1.0.0
  description: 校园帮小程序后端服务接口文档
servers:
  - url: http://localhost:3000/api
paths:
  /users:
    get:
      summary: 获取用户列表
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'
    post:
      summary: 用户注册
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserCreate'
      responses:
        '201':
          description: 用户创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /users/{id}:
    get:
      summary: 获取用户详情
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            example: 1
          required: true
          description: 用户ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      summary: 更新用户信息
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            example: 1
          required: true
          description: 用户ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UserUpdate'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      summary: 删除用户
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            example: 1
          required: true
          description: 用户ID
      responses:
        '204':
          description: 删除成功，无返回体
  /auth/login:
    post:
      summary: 用户登录
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [username, password]
              properties:
                username:
                  type: string
                password:
                  type: string
      responses:
        '200':
          description: 登录成功，返回用户基础信息及Token（如需）
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /tasks:
    get:
      summary: 获取任务列表
      parameters:
        - in: query
          name: status
          schema:
            type: integer
          description: 按任务状态过滤
        - in: query
          name: publisher_id
          schema:
            type: integer
          description: 按发布者ID筛选
        - in: query
          name: acceptor_id
          schema:
            type: integer
          description: 按接单者ID筛选
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'
    post:
      summary: 发布新任务
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskCreate'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /tasks/{id}:
    get:
      summary: 获取任务详情
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            example: 10
          required: true
          description: 任务ID
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    put:
      summary: 更新任务信息（如变更描述、状态等）
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            example: 10
          required: true
          description: 任务ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/TaskUpdate'
      responses:
        '200':
          description: 修改成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      summary: 删除任务
      parameters:
        - in: path
          name: id
          schema:
            type: integer
            example: 10
          required: true
          description: 任务ID
      responses:
        '204':
          description: 删除成功，无返回体
  /reviews:
    get:
      summary: 获取评价列表
      parameters:
        - in: query
          name: task_id
          schema:
            type: integer
          description: 按任务ID查询
        - in: query
          name: to_user_id
          schema:
            type: integer
          description: 查询某用户收到评价
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'
    post:
      summary: 新增评价
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ReviewCreate'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
  /reviews/{id}:
    get:
      summary: 获取评价详情
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: 评价ID
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponse'
    delete:
      summary: 删除评价
      parameters:
        - in: path
          name: id
          schema:
            type: integer
          required: true
          description: 评价ID
      responses:
        '204':
          description: 删除成功，无返回体
  /transactions:
    get:
      summary: 获取交易记录列表
      parameters:
        - in: query
          name: user_id
          schema:
            type: integer
          description: 查询指定用户的交易流水
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseList'

components:
  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: success
        data:
          type: object
    ApiResponseList:
      type: object
      properties:
        code:
          type: integer
          example: 200
        msg:
          type: string
          example: success
        data:
          type: array
          items:
            type: object
    UserCreate:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
        password:
          type: string
        nickname:
          type: string
        avatar:
          type: string
    UserUpdate:
      type: object
      properties:
        nickname:
          type: string
        avatar:
          type: string
        password:
          type: string
    TaskCreate:
      type: object
      required: [title, reward, publisher_id]
      properties:
        publisher_id:
          type: integer
        title:
          type: string
        description:
          type: string
        reward:
          type: integer
        location:
          type: string
        deadline:
          type: string
          format: date-time
    TaskUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        reward:
          type: integer
        location:
          type: string
        status:
          type: integer
        acceptor_id:
          type: integer
        deadline:
          type: string
          format: date-time
    ReviewCreate:
      type: object
      required: [task_id, from_user_id, to_user_id, rating]
      properties:
        task_id:
          type: integer
        from_user_id:
          type: integer
        to_user_id:
          type: integer
        rating:
          type: integer
          minimum: 1
          maximum: 5
        comment:
          type: string
